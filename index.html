<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2 DOM: conceitos básicos</title>
</head>

<body>
    <h1>Atividade 2 – DOM: conceitos básicos</h1>
    <h2>Contador de Cliques:</h2>
    <br>
    <button id="incrementar">Incrementar</button>
    <button id="decrementar">Decrementar</button>
    <p id="contar">Cliques: 0</p>
    <br>
    <h2>Texto dinâmico:</h2>
    <p>
        <input type="text" placeholder="Digite aqui" id="input"> <br>
    </p>
    <p><span id="resultado"></span></p>
    <br>
    <h2>Contador de caracteres:</h2>
    <input type="text" placeholder="Digite aqui:" id="caractere">
    <p id="resultado2">0</p>

    <h2>Adicionar novo item:</h2>
    <input type="text" placeholder="Digite aqui" id="add">

    <select id="tipoLista">
        <option value="ul">Lista não ordenada</option>
        <option value="ol">Lista ordenada</option>
    </select>

    <button id="botaoAdd">Adicionar item</button>

    <div id="lista"></div>
    <br>

    <h2>Botão de reset:</h2>
    <button id="botaoReset">Clique aqui para resetar</button>

    <script src="script.js"></script>
</body>

</html>
